services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /opt/portafolio_web/postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ───────────────────────────────────────────────────
  backend:
    build:
      context: ./portafolio_web/Backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Reflex Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: . # ← raíz del repo (donde está rxconfig.py)
      dockerfile: Dockerfile.frontend
    container_name: portfolio_frontend
    restart: unless-stopped
    environment:
      - REFLEX_ENV=prod
    networks:
      - frontend_net
    depends_on:
      - backend

# ── Redes ─────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
