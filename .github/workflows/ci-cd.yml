# ─────────────────────────────────────────────────────────────
# CI/CD Pipeline — Portafolio NetDevOps
#
# Flujo:
#   1. Test     → corre los tests de FastAPI
#   2. Security → escanea imágenes Docker con Trivy
#   3. Build    → construye y sube imágenes a GHCR
#   4. Deploy   → conecta al VPS y levanta los contenedores
#
# Se ejecuta en cada push a main
# ─────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/portfolio-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/portfolio-frontend

jobs:

  # ── JOB 1: Tests ────────────────────────────────────────────
  test:
    name: Tests FastAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: portafolio_web/Backend/requirements.txt

      - name: Instalar dependencias
        run: |
          cd portafolio_web/Backend
          pip install -r requirements.txt

      - name: Correr tests
        run: |
          cd portafolio_web/Backend
          pytest tests/ -v --tb=short

  # ── JOB 2: Seguridad con Trivy ──────────────────────────────
  security:
    name: Escaneo de Seguridad
    runs-on: ubuntu-latest
    needs: test                  # solo si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build imagen backend para escanear
        run: |
          docker build \
            -t portfolio-backend:scan \
            ./portafolio_web/Backend

      - name: Trivy — escanear imagen backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-backend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0            # 0 = reporta pero no falla el pipeline

      - name: Build imagen frontend para escanear
        run: |
          docker build \
            -t portfolio-frontend:scan \
            -f Dockerfile.frontend \
            .

      - name: Trivy — escanear imagen frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: portfolio-frontend:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  # ── JOB 3: Build y Push a GHCR ──────────────────────────────
  build:
    name: Build y Push Imágenes
    runs-on: ubuntu-latest
    needs: security              # solo si el escaneo pasa
    if: github.ref == 'refs/heads/main'   # solo en push a main, no en PRs

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./portafolio_web/Backend
          file: ./portafolio_web/Backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 4: Deploy al VPS ────────────────────────────────────
  deploy:
    name: Deploy al VPS
    runs-on: ubuntu-latest
    needs: build                 # solo si el build fue exitoso
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH al VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/portafolio

            # Descargar imágenes nuevas
            docker compose pull

            # Levantar con zero-downtime
            docker compose up -d --remove-orphans

            # Limpiar imágenes viejas
            docker image prune -f

            echo "✅ Deploy completado: $(date)"